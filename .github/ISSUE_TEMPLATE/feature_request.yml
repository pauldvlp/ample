name: Feature request
description: Suggest an idea or improvement for Ample
labels: ['enhancement']
body:
  - type: markdown
    attributes:
      value: |
        Ample is deliberately opinionated (see `AGENTS.md`) — feature requests
        that fit the "quiet-luxury private banking" design language and the
        single-user, local-first, SQLite model are the best fit.
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: What are you trying to do today that's awkward or impossible?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would the feature look/work like? Mockups or references welcome.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
