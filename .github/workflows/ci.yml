name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  commitlint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@v6

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # NOT 20: pnpm@11.12.0 itself requires Node >= 22.13 (it uses the
        # node:sqlite built-in internally) and fails installing anything
        # before even reaching this repo's own code — confirmed by this
        # matrix's first real run. The published npm package/Docker image
        # still support Node >= 20 for *end users*, who never invoke pnpm;
        # see README's Requirements section.
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm test:agent
