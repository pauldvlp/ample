name: release-please

on:
  push:
    branches: [main]
  # Escape hatch: publish the version currently checked out, without cutting a new
  # release. Use it when a release was tagged but never reached npm.
  workflow_dispatch:

# Never let two releases race: cutting a tag and publishing must not interleave.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release-please:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Only runs when release-please actually cut a release (i.e. its standing
  # "release PR" was just merged) — not on every push to main.
  publish:
    needs: release-please
    # `== 'true'` on purpose: a bare `${{ outputs.x }}` is a string test, and the
    # string "false" is truthy in Actions. always(): on workflow_dispatch the
    # release-please job is skipped, and a skipped dependency skips this one too.
    if: ${{ always() && (needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch') }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for npm OIDC trusted publishing — no NPM_TOKEN
      contents: read
    steps:
      # An empty ref (workflow_dispatch, where there is no tag) means "the ref that
      # triggered this run", which is what we want to publish in that case.
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: corepack enable
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm
      - name: Ensure npm >= 11.5.1 (required for Trusted Publishing)
        run: npm install -g npm@latest
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm stage:npm
      - name: Publish to npm (OIDC trusted publishing — no token)
        working-directory: ./dist-npm
        # Deliberately `npm publish`, not `pnpm publish` — pnpm 11's OIDC
        # support against the npm registry is still unreliable
        # (pnpm/pnpm#11513). See PUBLISHING.md for the one-time bootstrap this
        # depends on (OIDC can't create a brand-new package's first version).
        run: npm publish --provenance
